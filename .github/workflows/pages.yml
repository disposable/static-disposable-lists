name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          # Copy the main site file to root
          cp docs/index.html _site/
          # Copy JSON files to root (adjust paths in index.html to remove ../)
          cp mailservices.json _site/
          cp disposable-mail-hosts.json _site/

      - name: Fix paths in index.html
        run: |
          # Change ../mailservices.json to mailservices.json
          sed -i 's|\.\./mailservices\.json|mailservices.json|g' _site/index.html
          sed -i 's|\.\./disposable-mail-hosts\.json|disposable-mail-hosts.json|g' _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
