name: Validate data files

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate JSON files
        run: |
          check-jsonschema --schemafile schemas/mailservices.schema.json mailservices.json
          check-jsonschema --schemafile schemas/disposable-mail-hosts.schema.json disposable-mail-hosts.json

      - name: Validate hostname files
        run: python scripts/validate_hostnames.py manual.txt mail-data-hosts-net.txt

